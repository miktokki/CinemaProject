<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Edit movie</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>

<body class="container py-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <a th:href="@{/cinema/{city}(city=${city})}" class="btn btn-outline-secondary">
            Back
        </a>
    </div>

    <h1 class="mb-4">Edit movie</h1>

    <form th:object="${movie}" th:action="@{/savemovie}" method="post">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" name="city" th:value="${city}" />

        <div class="alert alert-danger" th:if="${#fields.hasAnyErrors()}">
            <ul>
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
        </div>

        <div>
            <label>Title</label>
            <input type="text" th:field="*{title}" />
        </div>

        <div>
            <label>Director</label>
            <input type="text" th:field="*{director}" />
        </div>

        <div>
            <label>Publication Year</label>
            <input type="number" th:field="*{publicationYear}" />
        </div>

        <div>
            <label>Duration</label>
            <input type="number" th:field="*{duration}" />
        </div>

        <div>
            <label>Price</label>
            <input type="number" th:field="*{price}" step="0.01" />
        </div>

        <div class="mt-3">
            <label>Genre</label>
            <select th:field="*{genre.id}" class="form-control">
                <option th:each="g : ${genres}" th:value="${g.id}" th:text="${g.name}"></option>
            </select>
        </div>

        <div>
            <label>Capacity</label>
            <input type="number" th:field="*{capacity}" min="0" />
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-success">Save</button>
        </div>

    </form>


</body>

</html>
